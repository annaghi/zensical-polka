fix = false
src = ["python"]
line-length = 120
output-format = "github"
target-version = "py312"
respect-gitignore = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[lint]
select = [
  "F",    # Pyflakes
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  'D',    # pydocstyle
  "I",    # isort
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "FA",   # flake8-future-annotations
  "PGH",  # pygrep-hooks
  "RUF",  # Ruff-specific
  "UP",   # pyupgrade
  "YTT",  # flake8-2020
  "DTZ",  # flake8-datetimez
  "ISC",  # flake8-implicit-str-concat
  "PIE",  # flake8-pie
  "T20",  # flake8-print
  "RSE",  # flake8-raise
  "FLY",  # flynt
  "PERF", # perflint
  "PLC",  # pylint convention
  "PLE",  # pylint errors
  "SIM",  # flake8-simplify
  "TC",   # flake8-type-checking: Type checking rules
]
ignore = ["D200", "D212", "D401", "D413", "PGH004"]

[lint.isort]
known-first-party = ["python/hooks"]
